<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCONTATO</title>
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>
body {
  background-image: url("morce.png");  /* Imagem como fundo pelo caminho da sua imagem de fundo */
  background-size: cover;   
  background-position: center; 
  background-repeat: no-repeat;
  cursor: url("pointer.png"), auto;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); } /* animação de rotação para o ícone de envio */
}
.spinning {
    animation: spin 1s linear infinite;
    display: inline-block;
}

</style>

</head>

<body>
 <div class="w3-content w3-padding " style="max-width:70%; background-color: rgba(254, 251, 228, 0.995);">

    <header class="w3-display-container" style="width:100%;">
        <img src="b1789b69-5e54-4f45-bcd7-38c02c37fc82.jpg" alt="Header"  style="width:100%; height: auto; object-fit: cover; filter: grayscale(0%); transition: filter 0.3s;"
           onmouseover="this.style.filter='grayscale(100%)'"
           onmouseout="this.style.filter='grayscale(0%)'"></header>

     <nav style="width: 100%; background-color: rgba(0,0,0,0.6); display: flex; flex-wrap: wrap; justify-content: center;">
    <a href="index.html" class="w3-button w3-mobile" style="color: white; font-family: 'Creepster', cursive; font-size: 1.1rem; letter-spacing: 2px;">🏚 Início</a>
    <a href="sobre.html" class="w3-button w3-mobile" style="color: white; font-family: 'Creepster', cursive; font-size: 1.1rem; letter-spacing: 2px;">💀 Sobre</a>
    <a href="contato.html" class="w3-button w3-mobile" style="color: white; font-family: 'Creepster', cursive; font-size: 1.1rem; letter-spacing: 2px;">🩸 Contato</a>
</nav> 
    
    
  <div class="w3-content w3-padding" style="max-width: min(70%, 95vw); background-color: rgba(254, 251, 228, 0.995);">
    <h1 style="color: rgb(6, 6, 4); font-family: 'Creepster', cursive">Faça sua matrícula</h1></div>  
 <div class="w3-dark-grey w3-hover-shadow w3-padding-64 w3-center" style="width: min(70%, 95%); margin: auto;">
   <form class="w3-container">
        <div style="max-width: 500px; margin: auto; text-align: left;">
            <label for="nome">Nome:</label>
            <input class="w3-input w3-animate-input" type="text"required style="width:70%"><br>

            <label for="email">Email:</label>
            <input class="w3-input w3-animate-input" type="text" required style="width:70%"><br>

            <label for="Phone">Telefone:</label>
            <input class="w3-input w3-animate-input" type="text" required style="width:70%"><br>
           
            <label for="sugestoes">Sugestões:</label>
            <input class="w3-input w3-animate-input" type="text" style="width:70%"><br>

        </div>
        <button class="w3-button w3-border w3-hover-red" onclick="this.querySelector('i').classList.add('spinning')">
    Enviar <i class="fa fa-refresh"></i>
</button>
    </form>
</div>
 

   <footer class="w3-container" style="padding: 2%; text-align: center;">
    <h4>Informações de Contato da nossa unidade:</h4>
    <h5>Telefone:</h5>
    <p>1234567</p>
    <h5>EMAIL:</h5>
    <p>USAT.terror@email.com</p>
    <img src="usat_logo_v2.svg" alt="Logo da USAT" style="width: clamp(80px, 25vw, 150px); margin-top: 16px;">
</footer>
 
</div>
</div>
</body>
