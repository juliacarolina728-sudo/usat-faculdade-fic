<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document</title>
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">

<style>
body {
  background-image: url("morce.png"); 
  background-size: cover;   
  background-position: center;
  background-repeat: no-repeat;
  cursor: url("pointer.png"), auto;
}
</style>

</head>

<body>
 <div class="w3-content w3-card " style="max-width:70%; background-color: rgba(254, 251, 228, 0.995);">

    <header class="w3-container" style="background-image: url('b1789b69-5e54-4f45-bcd7-38c02c37fc82.jpg'); background-size: cover; background-position: center; position: relative; padding: 20%; transition: filter 0.3s;" 
onmouseover="this.style.filter='grayscale(100%)'" 
onmouseout="this.style.filter='grayscale(0%)'"></header>

      <nav style="width: 100%; background-color: rgba(0,0,0,0.6);">
    <a href="index.html" class="w3-button w3-mobile" style="color: white; font-family: 'Creepster', cursive; font-size: 1.1rem; letter-spacing: 2px;">🏚 Início</a>
    <a href="sobre.html" class="w3-button w3-mobile" style="color: white; font-family: 'Creepster', cursive; font-size: 1.1rem; letter-spacing: 2px;">💀 Sobre</a>
    <a href="contato.html" class="w3-button w3-mobile" style="color: white; font-family: 'Creepster', cursive; font-size: 1.1rem; letter-spacing: 2px;">🩸 Contato</a>
</nav>
    
    
 <div class="w3-container" style="padding: 4% 8% 6% 8%; text-align: center" >
    <h1 style="color: rgb(6, 6, 4); font-family: 'Creepster', cursive">Faça sua matrícula</h1></div>
 <div class="w3-dark-grey w3-hover-shadow w3-padding-64 w3-center" style="width: 70%; margin: auto;">
    <form>
        <div style="max-width: 300px; margin: auto; text-align: left;">

            <label for="nome">Nome:</label>
            <input class="w3-input w3-border" type="text" id="nome" name="nome" required style="margin-bottom: 16px;">

            <label for="email">Email:</label>
            <input class="w3-input w3-border" type="email" id="email" name="email" required style="margin-bottom: 16px;">

            <label for="Phone">Telefone:</label>
            <input class="w3-input w3-border" type="tel" id="Phone" name="Telefone" required style="margin-bottom: 24px;">

        </div>
        <button class="w3-button w3-border w3-hover-red">Enviar</button>
    </form>
</div>
 
   <footer class="w3-container" style="padding: 2%; text-align: center;">
    <h4>Informações de Contato da nossa unidade:</h4>
    <h5>Telefone:</h5>
    <p>1234567</p>
    <h5>EMAIL:</h5>
    <p>USAT.terror@email.com</p>
    <img src="usat_logo_v2.svg" alt="Logo da USAT" style="width: 20%; margin-top: 16px;">
</footer>
 
</div>
</div>
</body>
</html>
